# Railway: crie um serviço com Root Directory = backend
# Variáveis: DATABASE_URL (Supabase), opcional DATABASE_SSL, FRONTEND_APP_URL, Google Calendar, etc.

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm run start:prod"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
